<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="header">
      <div class="about subheader">About</div>
      <div class="title">Library</div>
      <div class="profile subheader">Profile</div>
    </div>
    <div class="sidebar">
      <div class="sidebar-title subheader">Dummy Sidebar</div>
      <div class="sidebar-group">
        <div class="sidebar-item">Favorites</div>
        <div class="sidebar-item">Reviews</div>
        <div class="sidebar-item">Settings</div>
      </div>
    </div>
    <div class="books">
      <div class="books-header subheader">Books</div>
      <div class="book-card-wrapper">
        <div class="book-card">
          <div class="book-info">
            <div class="book-title">Title</div>
            <div class="book-author">Author</div>
            <div class="book-pages">Pages!</div>
          </div>
          <div class="book-buttons">
            <button>
              <img
                src="./images/star-full.png"
                alt="favorite button"
                class="favorite"
              />
            </button>
            <button>
              <img src="./images/check-mark.png" alt="" class="read" />
            </button>
            <button>
              <img src="./images/trash.png" alt="" class="remove" />
            </button>
          </div>
        </div>
        <div class="book-card"></div>
      </div>
    </div>
    <div class="add-book subheader">
      <div class="add-book-header">Add Book</div>
      <form action="" method="post">
        <div class="input-wrapper">
          <label for="author">Author</label>
          <input type="text" name="author" />
        </div>
        <div class="input-wrapper">
          <label for="title">Title</label>
          <input type="text" name="title" />
        </div>
        <div class="input-wrapper">
          <label for="pages">Pages</label>
          <input type="number" name="pages" />
        </div>
        <div class="input-wrapper">
          <label for="read">Read</label>
          <input type="checkbox" name="read" id="read" />
        </div>
        <div class="input-wrapper">
          <label for="favorite">Favorite</label>
          <input type="checkbox" name="favorite" id="favorite" />
        </div>
        <button type="submit" onClick="submitBook">Add</button>
      </form>
    </div>
    <script src="./main.js"></script>
  </body>
</html>
